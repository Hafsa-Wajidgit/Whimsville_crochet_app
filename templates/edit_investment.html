{% extends "base.html" %}
{% block title %}Edit Investment{% endblock %}

{% block content %}
<div class="section-header">
  <h2>Edit Investment</h2>
  <a href="{{ url_for('investments') }}" class="btn btn-secondary">← Back to Investments</a>
</div>

<div class="card form-container" style="max-width: 600px; margin: 0 auto;">
  <div class="form-header">
    <h3>Update Investment Record</h3>
  </div>
  
  <form action="{{ url_for('update_investment', iid=investment.investment_id) }}" method="POST">
    <div class="form-group">
      <label for="amount">Amount (PKR) <span class="required">*</span></label>
      <input type="number" id="amount" name="amount" step="0.01" min="0.01" value="{{ investment.amount }}" required>
    </div>
    
    <div class="form-group">
      <label for="description">Description <span class="required">*</span></label>
      <textarea id="description" name="description" rows="3" required>{{ investment.description }}</textarea>
    </div>
    
    <button type="submit" class="btn btn-primary w-100">Update Investment 💸</button>
  </form>
</div>
{% endblock %}
