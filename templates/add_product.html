{% extends "base.html" %}
{% block title %}Add Product{% endblock %}

{% block content %}
<div class="page-header">
  <div class="breadcrumb">Catalog <span>/ Add Product</span></div>
  <h1><span class="page-icon">🌸</span> Add to Catalog</h1>
  <p class="page-subtitle">List a new handmade treasure for your shop.</p>
</div>

<div class="card form-section">
  <form method="POST" action="{{ url_for('create_product') }}">
    <div class="form-grid">

      <div class="form-group full-width">
        <label>Product Title <span class="required">*</span></label>
        <input type="text" name="title" placeholder="e.g. Strawberry Plushie"
               value="{{ prefill.title if prefill else '' }}" required>
      </div>

      <div class="form-group full-width">
        <label>Description</label>
        <textarea name="description" rows="3"
                  placeholder="A soft, chunky crocheted strawberry with a smiling face…">{{ prefill.description if prefill else '' }}</textarea>
      </div>

      <div class="form-group">
        <label>Category <span class="required">*</span></label>
        <select name="category" required>
          <option value="" disabled {% if not prefill %}selected{% endif %}>— Select category —</option>
          {% for cat in ['Plushies', 'Cardigans', 'Cozies', 'Accessories', 'Home Décor', 'Seasonal', 'Other'] %}
          <option value="{{ cat }}"
            {% if prefill and prefill.category == cat %}selected{% endif %}>
            {{ cat }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Price (£) <span class="required">*</span></label>
        <input type="number" name="price" step="0.01" min="0.01" placeholder="0.00"
               value="{{ prefill.price if prefill else '' }}" required>
      </div>

      <div class="form-group">
        <label>Stock Quantity <span class="required">*</span></label>
        <input type="number" name="quantity" min="0" placeholder="0"
               value="{{ prefill.quantity if prefill else '' }}" required>
      </div>

    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">🌸 Add to Catalog</button>
      <a href="{{ url_for('catalog') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
