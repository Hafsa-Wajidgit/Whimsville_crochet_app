{% extends "base.html" %}
{% block title %}Add Member{% endblock %}

{% block content %}
<div class="page-header">
  <div class="breadcrumb">Members <span>/ Add New</span></div>
  <h1><span class="page-icon">✨</span> Register a Member</h1>
  <p class="page-subtitle">Every great customer deserves a beautiful profile.</p>
</div>

<div class="card form-section">
  <form method="POST" action="{{ url_for('create_member') }}">
    <div class="form-grid">

      <div class="form-group full-width">
        <label>Full Name <span class="required">*</span></label>
        <input type="text" name="name" placeholder="e.g. Rose Whitmore"
               value="{{ prefill.name if prefill else '' }}" required>
      </div>

      <div class="form-group">
        <label>Email Address <span class="required">*</span></label>
        <input type="email" name="email" placeholder="rose@example.com"
               value="{{ prefill.email if prefill else '' }}" required>
      </div>

      <div class="form-group">
        <label>Phone Number <span class="required">*</span></label>
        <input type="text" name="phone" placeholder="555-0100"
               value="{{ prefill.phone if prefill else '' }}" required>
      </div>

      <div class="form-group full-width">
        <label>Mailing Address <span class="required">*</span></label>
        <textarea name="address" rows="3" placeholder="12 Bluebell Lane, Bath, UK" required>{{ prefill.address if prefill else '' }}</textarea>
      </div>

    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">✿ Register Member</button>
      <a href="{{ url_for('view_members') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
